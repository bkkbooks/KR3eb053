front:
  text: 序脈學診斷之書以李瀕湖朱丹溪二家最為細膩凡相似相異之處皆能分別清楚用筆描摹比擬形狀俾後學無誤認之處可謂大有功於斯世惜察舌一法二公未有專書世所傳者惟傷寒舌鑑溫疫舌鑑而已欲求其如脈學之詳細者未之有也瑞因用心三十餘年將診斷試驗醫治得效歷歷不爽者筆記於册以授徒輩未敢自以為是也庚戌鎮郡同志袁君桂生等創辦醫學扶輪報以昌明醫學瑞以有志於此者十年獨力未能舉行一旦有袁君登高一呼同志響應成斯盛舉瑞不覺鼓舞附驥分任印費報料之責至庚戌歲冬諸君有退志者甚多印費報料因而缺乏將成中止之局瑞與楊君燧熙袁君桂生葉君子實竭力勉為之因來稿不多遂將瑞所授徒之察舌新法濫竽充數刻印未終至辛亥八月而瑞等之扶輪報亦與清鼎同時革命矣今紹興醫會上海醫會閲報諸君時有來函向袁楊二君索閲全稿者此皆閲扶輪報之舊友不以葑菲見棄殆以管見之比擬描摹尚有可採處爰從二君之議抄録全稿加序送紹學醫學報社遵周君小農流通書籍辦法版權歸於貴社印成賜瑞若干份以就正親友同志於願足矣不揣固陋非敢勇於公益亦拋磚引玉之苦心耳是為序伏乞諸大名家誨政以匡不逮是幸歲次柔兆執徐春分後三日劉恆瑞自序於京江之有預齋停雲傳舍
