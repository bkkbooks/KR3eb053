body:
  text: 舌苔原理舌為胃之外候以輸送食物入食管胃脘之用其舌體之組織系由第五對腦筋達舌其功用全賴此筋運動舌下紫青筋二條乃少陰腎脈上達名曰金津玉液二穴所以生津液以濡潤舌質拌化食物者也中醫以舌苔辨症者以其苔堆於表面易於辨認而未知苔因何而生此理未明其辨症之識必有毫釐千里之誤此原理之不可不講也夫舌之表面乃多數極小乳頭鋪合而成此乳頭極小微點其不易見時非顯微鏡不能窺見易見時形如芒刺摸之棘手或隱或見或大或小或平滑或高起隨時隨症變易不定苔即胃中食物腐化之濁氣堆於乳頭之上此舌苔所由生也常人一日三餐故苔亦日有三變謂之活苔無病之象也其所以有變者因飲食入胃時將腐濁之氣遏郁下降故苔色一退至飲食腐化濁氣上蒸苔色又生胃中無腐濁則苔薄而少有腐濁則苔多而厚此其常理也至論其色則以黃色為正白為肺色胃中陽氣被飲食抑遏胃中正色不能直達而上故有暫白之時青為絶色青緑之色見於舌上其人命必危其外尚有似黃非黃似白非白各類間色皆條分於後以備後學細心參考看舌八法一看苔色詳後二看舌質質亦有色又有大小濕熱之症舌質脹大滿口邊有齒印血熱之症質色紫三看舌尖白苔滿舌尖有紅刺勿用溫燥之藥四看舌心四邊有苔中無或中有直裂或有直槽或橫裂五看燥潤以手摸之或滑潤或燥刺棘手有看似潤而摸之燥者有看似燥而摸之滑者六看舌邊苔色與邊齊否七看舌根根後有無苔色接續有無大肉瘤八看變換觀其變與不變黃苔類總論黃色有深淺老嫩之殊其形似亦有燥潤滑澀之異有正黃色者有老黃色者有黃如炒枳殼色者有黃黑相間如鍋焦黃色者有嫩黃色者有牙黃色者有如裱心紙兼灰青色者有黃如粟米染著者有黃如虎斑紋者有黃如黃蠟敷舌上者有水黃苔如雞子黃白相兼染成者有黃腐苔如豆渣炒黃堆舌者此皆黃色之類而症候之殊詳後白苔類總論白苔有厚薄密疏之殊其形似亦有深淺間雜之異有薄白如米飲敷舌者有白如豆漿敷舌者有白而厚如豆腐腦鋪舌者有白而疏如米粉鋪紅者有白如粟米成顆粒者有白如銀色者有白如旱煙灰色者有白如銀錠底者有白如豆腐渣堆舌者有白如豆腐筋堆舌者有白如糙石糙手者有似白非白色如畫工以脂調粉此色有二一淡如雪青湖皺色者一深如雪青杭綢色者古皆以絳色名之更有舌質深紅如紅蘿蔔干有鹽霜者此皆白苔之類而寒熱之症各殊亦細詳於後舌質無苔類總論舌質無苔亦有分別有質紫無苔者有質紅無苔者有舌上無苔質光如鏡者有質干如刺無苔者有中凹如駁去者有中有直溝如刀背印成者有舌質橫裂者有舌生裂後如冰片紋者有前半光滑如鏡後根上有肉瘤二粒色如舌肉色者有表面無苔而皮內隱一塊如錢大或黃或白者有苔上見圓暈分二三色者有苔見青緑二色者此皆表面無苔而所主之症各不同也亦詳於後黃苔類分別診斷法正黃色為胃土正色為溫病始傳之候其為濕溫溫熱當以脈之滑澀有力無力分別用藥老黃色為胃中陽氣旺盛之候若厚腐堆起此胃中飲食消化腐濁之氣上達之後為濕溫化熱之始為溫熱傳入中焦陽明之候黃如炒枳殼色為胃陽盛極陽亢陰虛之候胃氣欲傷胃汁乾稿故苔黃色如枳殼炒過狀以其乾枯不潤澤也黃黑相間如鍋焦黃色摸之棘手看之不澤為胃中津液焦灼口燥舌乾之候然亦有陽氣為陰邪所阻不能上蒸而化為津液者當以脈診分別斷之脈澀有力鼓指者火灼津也脈滑無力鼓指只有往來而無起伏者痰飲瘀血阻抑陽氣不能化生津液也嫩黃色由白而變為黃為嫩黃色此為用藥當胃陽初醒之候吉兆也為飲食消化腐濁初升也牙黃色胃中腐濁之氣始升也牙黃無孔謂之膩苔中焦有痰也裱心紙兼灰青色苔雖黃而兼灰青此傷風初候或陽氣抑鬱黃苔無正色當舒氣化郁黃如粟米染著顆粒分明此為胃陽太旺胃熱之候黃如虎斑紋氣血兩燔之候黃如蠟敷舌上濕溫痰滯之候故苔無孔而膩水黃苔如雞子黃白相間染成此黃而潤滑之苔為痰飲停積是濕溫正候或為溫熱症而有水飲者或熱入胃陰誤服燥藥而變生此苔式者宜以診脈分別斷之黃腐苔如豆渣炒黃堆舌下症也如中有直裂氣虛也不可下當補氣以氣不足以運氣也白苔類分別診斷法薄白如米飲敷舌此傷寒中寒之初候也無表症狀見者飲食停膈上也白如豆漿敷舌此白而滑潤傷寒中寒濕邪痰飲等病也以脈診分別斷之但薄白不潤澤舌質不甚紅者傷燥表症也白而厚如豆腐腦鋪舌痰熱症也白而疏如米粉鋪紅傷熱傷暑初傳之候也白如粟米成顆粒此熱邪在氣分也白如銀色謂光亮如銀此熱症誤補之變苔也白如旱煙灰色不問潤燥皆熱症誤燥之變苔也白如銀錠底謂有孔如銀錠底式此熱症誤補誤燥津液已傷元氣欲陷邪將深入之候也白如豆腐渣堆舌此熱症誤燥腐濁積滯胃中欲作下症也如中心開裂則為虛極反似實症之候當補氣須以脈診分別之白如豆腐筋堆舌謂白苔厚而有孔如豆腐煮熟有孔者曰筋謂有二三條白者余則紅色或圓或長看見舌質此胃熱痰滯腐濁積聚誤燥當下不下之候過此不下則無下證可見矣白如糙石糙手此燥傷胃汁不能潤舌腎氣不能上達之候亦有清氣被抑不能生津者當以脈診分別斷之與黃黑如鍋焦色條下參觀似白非白如畫工以脂調粉為雪青色有深淺二種淺者如雪青湖皺色此乃熱邪入營初候深者如雪青杭綢色此乃暑熱二邪已入血分之候此苔類似薄白但舌質紅而細看有乳頭微點者故以雪青色名之為血分熱症必有之苔常見苔也但人以白苔視之多誤作寒症故特提出以醒眉目古人但以舌絳二字了之後學何從解悟故以細心體認比例法直告之俾無誤認之弊舌質深紅如紅蘿蔔干有鹽霜此乃熱邪深入久留誤服攻燥之藥胃陰大傷之候溫熱末傳危症也舌質無苔分別診斷法質紫無苔熱在陰分也質紅無苔熱邪初入陰分或者傷食胃氣不能上升或憂思鬱抑陽氣不能上升須以脈診參斷舌上無苔質光如鏡為胃陰胃陽兩傷腸胃中之茸毛貼壁完穀不化飢不受食之候亦有頑痰膠滯胃中茸毛不起皆有此候須以脈診參斷前症完穀陰陽傷脈必細澀後症痰滯脈必洪滑而大質干如刺無苔紫而乾者熱傷陰液紅而乾者氣不化津須以脈診參斷中凹如駁去胃有燥結傷陰或盲腸有燥結久留不去之候中有直溝如刀背印成陰液元氣皆虛也舌質橫裂素體陰虧也舌生裂紋如冰片紋老年陰虛常見之象也少年罕見有此不吉前半光滑無苔後根上有肉瘤二粒如舌肉色為陰虛癆症之象也表面無苔而皮內有一塊如錢大或黃或白為正氣不足血液虧虛或有痰凝之候須以脈診參斷苔上見圓暈分二三色燥金內結燥屎不下之候其症必險苔見青緑色必死之症也苔色變換吉凶總論總之苔黃為正白次之無論何症若用藥當皆由白而黃由黃而退由退復生新薄白苔此謂順象無論何症若用藥不當則由黃而白由白而灰由灰而黑由活苔變為死苔此逆象也驟退驟無不由漸退此陷象也更有氣聚苔聚氣斂苔斂氣化苔化氣散布苔亦散布氣凝聚而結苔亦凝聚而結氣結於一邊苔亦結於一邊故氣鬱之症苔邊整齊如石階之起邊線線內有苔線外無苔但紅邊而已若氣舒化則散布由密而疏散則不似斬然齊一之邊矣故苔有邊齊如斬者氣聚也有積滯抑鬱者也苔之真退假退駁去辨苔之真退真化與駁去驟退有大分別真退必由化而退何謂化退因苔由厚而漸薄由板而生孔由密而漸疏由有而漸無由舌根外達至舌尖由尖而漸變疏薄由退而復生新苔此皆吉兆若驟然退去不復生新苔或如駁去斑斑駁駁存留如豆腐屑鋪舌上東一點西一點散離而不連續皆逆象也皆因誤用攻伐消導之劑或誤表之故胃氣胃汁俱被傷殘故有此候燥潤辨濕症舌潤熱症舌燥此理之常也然亦有濕邪傳入氣分氣不化津而反燥者熱症傳入血分舌反潤者亦有誤用燥藥津液被劫逼迫而上胃陰不能下濟舌反潤者不可不知是在指下診脈功夫參合之矣厚腐之苔無寒症辨厚腐之苔無寒症胃陽上蒸濁氣上達故苔腐厚忌用溫燥宣化之劑尤忌發表此宜清降導下或中有直槽氣虛不能運化之故宜補氣不得因苔色尚白而溫表之宣燥之犯之必變灰暗切宜猛省厚腐與厚膩不同辨厚腐與厚膩不同腐者如腐渣如腐筋如豆腐堆鋪者其邊厚為陽有餘能鼓胃中腐化濁氣上升故有此象若厚膩則中心稍厚其邊則薄無毛孔無顆粒如以光滑之物刡刮一過者此為厚膩為陽氣被陰邪所抑必有濕濁痰飲食積瘀血頑痰為病宜宣化一為陽氣有餘一為陽氣被抑差之毫釐失之千里可不慎哉今人多誤認膩字故特論辨以分別之舌短舌強辨短者舌伸不長之謂也屬虛舌短囊縮者屬熱舌短而囊不縮者屬虛強者不能運用言語不清之謂也則腦筋功用有損失之因當察其所因之故得其故方有治法補黑苔類舌上黑苔有由白而黃由黃而黑者順症也有由白而灰由灰而黑不由黃而黑者此謂之黑陷苔逆症也此多因誤用溫燥之藥多日所致甚難挽救亦有脈遲苔黑者此腎命不足當溫補真火亦有食物染成黑苔者但刮之即去本色即見故見有苔黑者必以指刮之以辨真偽真者刮之不去方以黑苔斷之其由黃而黑者此乃陽明熱結之症潤下得法胃腑炭氣得以外出也故曰順症使人不必疑慮也
